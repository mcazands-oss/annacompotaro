<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Anna Compotaro Photography — coming soon." />
  <title>Anna Compotaro Photography</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>
<body>

  <!-- Ambient light blobs -->
  <div class="ambient ambient-1" aria-hidden="true"></div>
  <div class="ambient ambient-2" aria-hidden="true"></div>

  <!-- Floating corner ornaments -->
  <div class="ornament ornament-tl" aria-hidden="true">
    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M32 4 C32 4 20 18 20 32 C20 46 32 60 32 60" stroke="#c9a96e" stroke-width="0.8" fill="none"/>
      <path d="M32 4 C32 4 44 18 44 32 C44 46 32 60 32 60" stroke="#c9a96e" stroke-width="0.8" fill="none"/>
      <path d="M10 22 C10 22 22 28 32 28 C42 28 54 22 54 22" stroke="#c9a96e" stroke-width="0.5" fill="none"/>
      <path d="M8 38 C8 38 20 36 32 36 C44 36 56 38 56 38" stroke="#c9a96e" stroke-width="0.5" fill="none"/>
      <circle cx="32" cy="4" r="1.5" fill="#c9a96e"/>
      <circle cx="32" cy="60" r="1.5" fill="#c9a96e"/>
    </svg>
  </div>

  <div class="ornament ornament-br" aria-hidden="true">
    <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M32 4 C32 4 20 18 20 32 C20 46 32 60 32 60" stroke="#c9a96e" stroke-width="0.8" fill="none"/>
      <path d="M32 4 C32 4 44 18 44 32 C44 46 32 60 32 60" stroke="#c9a96e" stroke-width="0.8" fill="none"/>
      <path d="M10 22 C10 22 22 28 32 28 C42 28 54 22 54 22" stroke="#c9a96e" stroke-width="0.5" fill="none"/>
      <path d="M8 38 C8 38 20 36 32 36 C44 36 56 38 56 38" stroke="#c9a96e" stroke-width="0.5" fill="none"/>
      <circle cx="32" cy="4" r="1.5" fill="#c9a96e"/>
      <circle cx="32" cy="60" r="1.5" fill="#c9a96e"/>
    </svg>
  </div>

  <!-- Top bar -->
  <header class="top-bar">
    <span class="logo-mark">AC</span>
    <span class="nav-hint">est. 2025</span>
  </header>

  <!-- Main content -->
  <main class="page">

    <!-- Top rule -->
    <div class="rule rule-top" aria-hidden="true"></div>

    <!-- Hero name -->
    <div class="hero" aria-label="Anna Compotaro">
      <h1 class="name">
        <span class="name-first">Anna</span>
        <span class="name-last">Compotaro</span>
      </h1>
      <p class="subtitle">Photography</p>
    </div>

    <!-- Bottom rule -->
    <div class="rule rule-bottom" aria-hidden="true"></div>

    <!-- Coming soon message -->
    <div class="coming-soon-block">
      <p class="coming-soon-eyebrow">Something is coming</p>
      <p class="coming-soon-text">
        The light is almost right.<br>
        A new portfolio is being crafted — thoughtfully, slowly, beautifully.
      </p>
      <div class="dots" aria-hidden="true">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>

    <!-- Email notify -->
    <section class="notify-section" aria-label="Get notified at launch">
      <p class="notify-label">Be the first to know</p>

      <form class="notify-form" id="notifyForm" novalidate>
        <input
          class="notify-input"
          type="email"
          id="emailInput"
          name="email"
          placeholder="your@email.com"
          autocomplete="email"
          aria-label="Email address"
          required
        />
        <button class="notify-btn" type="submit">Notify me</button>
      </form>

      <p class="form-note" id="formNote">No spam &mdash; only the moment the work is ready.</p>
      <p class="form-success" id="formSuccess" role="status">Thank you — I&rsquo;ll be in touch.</p>
    </section>

  </main>

  <!-- Footer -->
  <footer>
    <p class="footer-text">&copy; 2025 Anna Compotaro Photography</p>
  </footer>

  <script>
    const form = document.getElementById('notifyForm');
    const note = document.getElementById('formNote');
    const success = document.getElementById('formSuccess');
    const input = document.getElementById('emailInput');

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      const email = input.value.trim();
      if (!email || !email.includes('@')) {
        input.style.borderColor = 'rgba(201,90,90,0.5)';
        setTimeout(() => (input.style.borderColor = ''), 1200);
        return;
      }

      // Graceful static fallback: open mailto with the address pre-filled
      // In production, swap this for a real API call or form service
      const mailto = 'mailto:anna@annacompotaro.com?subject=Notify%20me%20at%20launch&body=Please%20add%20' + encodeURIComponent(email) + '%20to%20the%20launch%20list.';

      form.style.opacity = '0';
      form.style.transition = 'opacity 0.4s ease';
      setTimeout(() => {
        form.style.display = 'none';
        note.style.display = 'none';
        success.style.display = 'block';
      }, 400);

      // Open mailto quietly — doesn't navigate away
      window.location.href = mailto;
    });
  </script>

</body>
</html>
